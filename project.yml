name: GhostPepper
options:
  bundleIdPrefix: com.github.matthartman
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.16.0"
  LLM.swift:
    url: https://github.com/eastriverlee/LLM.swift.git
    branch: main

targets:
  GhostPepper:
    type: application
    platform: macOS
    sources:
      - GhostPepper
    settings:
      base:
        INFOPLIST_FILE: GhostPepper/Info.plist
        CODE_SIGN_ENTITLEMENTS: GhostPepper/GhostPepper.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.github.matthartman.ghostpepper
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BBVMGXR9AY
    dependencies:
      - package: WhisperKit
      - package: LLM.swift
        product: LLM
    entitlements:
      path: GhostPepper/GhostPepper.entitlements

  GhostPepperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - GhostPepperTests
    dependencies:
      - target: GhostPepper
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GhostPepper.app/Contents/MacOS/GhostPepper"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
